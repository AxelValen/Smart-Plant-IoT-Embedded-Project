<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ESP32 MQTT Monitor</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 2rem; }
    h1   { color: #0f0; }
    .value  { font-size: 3rem; color: #0f0; }
    .label  { color: #888; font-size: 0.9rem; }
    #status { font-size: 0.85rem; margin-bottom: 1rem; }
    #log    { margin-top: 2rem; max-height: 200px; overflow-y: auto;
              border-top: 1px solid #333; padding-top: 1rem; }
    .log-entry { color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>ESP32 MQTT Monitor</h1>
  <div id="status">⏳ Conectando al servidor...</div>

  <p class="label">Valor</p>
  <div class="value" id="valor">—</div>

  <p class="label">Mensaje</p>
  <div id="mensaje">—</div>

  <p class="label">Último update</p>
  <div id="timestamp">—</div>

  <div style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1.5rem;">
    <p class="label">Control actuador</p>
    <button id="btnLed" onclick="toggleLed()"
      style="background:#0f0; color:#111; border:none; padding: 0.8rem 2rem;
            font-size:1.2rem; font-family:monospace; cursor:pointer; border-radius:4px;">
      💡 Encender LED
    </button>
    <span id="ledStatus" style="margin-left:1rem; color:#888;">Estado: desconocido</span>
  </div>

  <div id="log"><p class="label">Log de mensajes:</p></div>

  <script>
    // WebSocket: conexión persistente, el servidor empuja los datos
    const ws = new WebSocket(`ws://${location.host}`);

    let ledOn = false;

    function toggleLed() {
      ledOn = !ledOn;
      const cmd     = ledOn ? 'LED_ON' : 'LED_OFF';
      const btn     = document.getElementById('btnLed');
      const status  = document.getElementById('ledStatus');

      ws.send(cmd); // envía el comando al servidor Node.js via WebSocket

      btn.textContent     = ledOn ? '💡 Apagar LED' : '💡 Encender LED';
      btn.style.background = ledOn ? '#ff0' : '#0f0';
      status.textContent  = `Estado: ${ledOn ? 'ENCENDIDO 🟡' : 'APAGADO ⚫'}`;
    }

    ws.onopen = () => {
      document.getElementById('status').textContent = '🟢 Conectado via WebSocket';
    };

    ws.onclose = () => {
      document.getElementById('status').textContent = '🔴 Desconectado';
    };

    ws.onmessage = (event) => {
      try {
        const d = JSON.parse(event.data);

        document.getElementById('valor').textContent     = d.valor   ?? '—';
        document.getElementById('mensaje').textContent   = d.mensaje ?? '—';
        document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();

        // Agrega al log
        const log   = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className   = 'log-entry';
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${event.data}`;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
      } catch(e) {
        console.error('Error parseando mensaje:', e);
      }
    };
  </script>
</body>
</html>
